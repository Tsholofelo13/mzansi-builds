<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Sign in to continue</p>
    </div>
    
    <div *ngIf="errorMessage" class="error-message">
      <span class="error-icon">!</span>
      {{ errorMessage }}
    </div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="formData.email" name="email" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="formData.password" name="password" placeholder="Enter your password" required>
      </div>
      
      <button type="submit" class="btn-login-submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    
    <div class="register-link">
      <p>Don't have an account? <a routerLink="/register">Register</a></p>
    </div>
  </div>
</div>

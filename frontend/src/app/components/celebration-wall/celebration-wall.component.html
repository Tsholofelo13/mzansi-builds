<div class="container">
  <h1>íľ‰ Celebration Wall íľ‰</h1>
  <p>Celebrating developers who completed their projects!</p>
  
  <div *ngIf="loading" class="loading">Loading...</div>
  
  <div *ngIf="!loading && completedProjects.length === 0" class="empty">
    <p>No completed projects yet. Be the first to complete a project!</p>
  </div>
  
  <div class="celebration-grid">
    <div *ngFor="let project of completedProjects" class="celebration-card">
      <div class="trophy">íż†</div>
      <h3>{{ project.title }}</h3>
      <p>by {{ project.owner.fullName }}</p>
    </div>
  </div>
</div>

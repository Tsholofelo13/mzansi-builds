<div class="container">
  <h1>Celebration Wall</h1>
  <p>Celebrating developers who completed their projects</p>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
  
  <div *ngIf="!loading && completedProjects.length === 0" class="empty">
    <h3>No completed projects yet</h3>
    <p>Be the first developer to complete a project</p>
  </div>
  
  <div class="celebration-grid">
    <div *ngFor="let project of completedProjects" class="celebration-card">
      <h3>{{ project.title }}</h3>
      <p>by {{ project.owner.fullName }}</p>
      <div class="completion-badge">
        <span>Completed</span>
      </div>
    </div>
  </div>
</div>

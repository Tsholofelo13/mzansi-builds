<div class="container">
  <h1>Celebration Wall</h1>
  <p>Celebrating developers who completed their projects</p>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading achievements...</p>
  </div>
  
  <div *ngIf="errorMessage" class="error">
    <p>{{ errorMessage }}</p>
    <button (click)="loadCompletedProjects()" class="btn-retry">Try Again</button>
  </div>
  
  <div *ngIf="!loading && !errorMessage && completedProjects.length === 0" class="empty">
    <h3>No completed projects yet</h3>
    <p>Mark a project as "Completed" to see it celebrated here</p>
    <button routerLink="/create-project" class="btn-primary">Create a Project</button>
  </div>
  
  <div class="celebration-grid" *ngIf="!loading && !errorMessage && completedProjects.length > 0">
    <div *ngFor="let project of completedProjects" class="celebration-card">
      <div class="trophy-text">[Trophy]</div>
      <h3>{{ project.title }}</h3>
      <p>by {{ project.owner?.fullName || 'Unknown' }}</p>
      <div class="completion-badge">
        <span>Completed</span>
      </div>
    </div>
  </div>
</div>

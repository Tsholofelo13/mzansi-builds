<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>Create Account</h1>
      <p>Join the community</p>
    </div>
    
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="formData.fullName" name="fullName" required>
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="formData.email" name="email" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="formData.password" name="password" required>
      </div>
      
      <div class="form-group">
        <label>GitHub Username (Optional)</label>
        <input type="text" [(ngModel)]="formData.githubUsername" name="githubUsername">
      </div>
      
      <button type="submit" class="btn-register-submit" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
    </form>
    
    <div class="login-link">
      <p>Already have an account? <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>

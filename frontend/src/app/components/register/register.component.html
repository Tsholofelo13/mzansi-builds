<div class="container">
  <div class="card">
    <h2>Register for MzansiBuilds</h2>
    
    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success">{{ successMessage }}</div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" [(ngModel)]="formData.fullName" name="fullName" required>
      </div>
      
      <div class="form-group">
        <label>Email *</label>
        <input type="email" [(ngModel)]="formData.email" name="email" required>
      </div>
      
      <div class="form-group">
        <label>Password *</label>
        <input type="password" [(ngModel)]="formData.password" name="password" required minlength="6">
      </div>
      
      <div class="form-group">
        <label>GitHub Username (optional)</label>
        <input type="text" [(ngModel)]="formData.githubUsername" name="githubUsername">
      </div>
      
      <button type="submit" class="btn-primary">Register</button>
    </form>
    
    <p class="link">Already have an account? <a routerLink="/login">Login here</a></p>
  </div>
</div>

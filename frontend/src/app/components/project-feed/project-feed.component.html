<div class="container">
  <h2>Live Feed - What developers are building</h2>
  
  <div *ngIf="loading" class="loading">Loading projects...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
  
  <div class="projects-grid">
    <div *ngFor="let project of projects" class="project-card">
      <h3>{{ project.title }}</h3>
      <p>{{ project.description }}</p>
      <p><strong>By:</strong> {{ project.owner.fullName }}</p>
      <p *ngIf="project.supportNeeded"><strong>Support needed:</strong> {{ project.supportNeeded }}</p>
      <p><strong>Stage:</strong> {{ project.stage }}</p>
    </div>
  </div>
</div>

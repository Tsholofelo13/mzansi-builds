<div class="navbar">
  <div class="nav-brand">
    <h1>MzansiBuilds</h1>
  </div>
  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" *ngIf="isLoggedIn">Feed</a>
    <a routerLink="/create-project" routerLinkActive="active" *ngIf="isLoggedIn">Create</a>
    <a routerLink="/celebration-wall" routerLinkActive="active" *ngIf="isLoggedIn">Celebration</a>
    <a routerLink="/profile" routerLinkActive="active" *ngIf="isLoggedIn">Profile</a>
    <a routerLink="/settings" routerLinkActive="active" *ngIf="isLoggedIn">Settings</a>
    <span *ngIf="isLoggedIn" class="user-email">{{ userEmail }}</span>
    <button *ngIf="isLoggedIn" (click)="logout()" class="btn-logout">Logout</button>
    <a *ngIf="!isLoggedIn" routerLink="/login" class="btn-login">Login</a>
    <a *ngIf="!isLoggedIn" routerLink="/register" class="btn-register">Register</a>
  </div>
</div>

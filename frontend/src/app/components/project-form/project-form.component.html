<div class="container">
  <div class="card">
    <h2>Create a New Project</h2>
    
    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success">{{ successMessage }}</div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Project Title *</label>
        <input type="text" [(ngModel)]="formData.title" name="title" required>
      </div>
      
      <div class="form-group">
        <label>Description *</label>
        <textarea [(ngModel)]="formData.description" name="description" rows="4" required></textarea>
      </div>
      
      <div class="form-group">
        <label>Current Stage</label>
        <select [(ngModel)]="formData.stage" name="stage">
          <option value="IDEA">Idea</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="REVIEW">Review</option>
          <option value="COMPLETED">Completed</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Support Needed (what kind of help?)</label>
        <input type="text" [(ngModel)]="formData.supportNeeded" name="supportNeeded">
      </div>
      
      <div class="form-group">
        <label>GitHub Repository URL</label>
        <input type="url" [(ngModel)]="formData.githubRepoUrl" name="githubRepoUrl">
      </div>
      
      <button type="submit" class="btn-primary">Create Project</button>
    </form>
  </div>
</div>
